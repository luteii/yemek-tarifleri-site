<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Tarif Dünyası</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <main class="login-container">
        <h2>Mutfağa Giriş</h2>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Şefin Adı</label>
                <input type="text" id="username" name="username" placeholder="Kullanıcı adınızı girin" required>
            </div>
            
            <div class="form-group">
                <label for="password">Gizli Tarif (Şifre)</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Giriş Yap</button>
        </form>
        
        <div class="login-footer">
            <p>Henüz mutfağımızda yok musun?</p>
            <a href="/register" class="register-link">Hemen Kayıt Ol</a>
        </div>
    </main>

</body>
</html>
