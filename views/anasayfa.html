<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutfağım - Tarif Dünyası</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Ana sayfaya özel ekstra stiller (Style.css'i bozmamak için) */
        body {
            /* style.css'teki arka planı burada ezmiyoruz, aynısını kullanacak */
            align-items: flex-start; /* İçeriğin üstten başlaması için */
            padding-top: 50px;
        }
        .dashboard-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 80%; /* Login kutusundan daha geniş */
            max-width: 900px;
            margin: 0 auto;
            text-align: left; /* Metinler sola dayalı */
            animation: fadeIn 0.5s ease-out;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EDF2F4;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 { color: #D90429; margin: 0; }
        .logout-btn {
            background-color: #2B2D42;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-btn:hover { background-color: #1a1b28; }
        .content-area {
            text-align: center;
            padding: 50px 0;
            color: #555;
        }
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .recipe-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>👨‍🍳 Mutfak Paneli</h1>
            <a href="/login" class="logout-btn">Çıkış Yap</a>
        </div>

        <div class="content-area">
            <h2>Hoş Geldin Şefim!</h2>
            <p>Burası senin mutfağın. İleride kendi tariflerini ekleyebileceğin ve diğer şeflerin tariflerini görebileceğin alan burası olacak.</p>
            
            <div class="recipe-grid">
                <div class="recipe-card">
                    <h3>🍝 Spagetti Bolonez</h3>
                    <p>Hazırlama: 30 dk</p>
                </div>
                <div class="recipe-card">
                    <h3>🍰 San Sebastian</h3>
                    <p>Hazırlama: 45 dk</p>
                </div>
                <div class="recipe-card">
                    <h3>🥑 Avokado Tost</h3>
                    <p>Hazırlama: 10 dk</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
