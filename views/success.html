<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Başarılı - Tarif Dünyası</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .success-card {
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #D90429;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(217, 4, 41, 0.3);
        }
        h2 { color: #2B2D42; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #2B2D42;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        .back-link:hover { background-color: #D90429; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="login-container success-card">
        <div class="icon-circle">✓</div>
        <h2>Kayıt Başarılı!</h2>
        <p>Tarif dünyasına hoş geldin Şef. Bilgilerin güvenle <b>data/users.json</b> dosyasına eklendi.</p>
        <a href="/login" class="back-link">Giriş Ekranına Git</a>
    </div>
</body>
</html>
