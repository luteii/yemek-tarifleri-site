<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Başarılı - Tarif Dünyası</title>
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .success-card {
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            padding: 50px 40px; /* Kutuyu biraz daha ferah yaptık */
        }
        
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #D90429;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(217, 4, 41, 0.3);
        }
        
        .success-card h2 { 
            color: #D90429; 
            margin-bottom: 15px; 
            font-weight: 800;
        }
        
        .success-card p { 
            color: #555; 
            line-height: 1.6; 
            margin-bottom: 30px;
            font-size: 15px;
        }
        
        /* Butonu senin btn-login tarzına daha uygun hale getirdik */
        .btn-success {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #2B2D42;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            box-sizing: border-box;
        }
        
        .btn-success:hover { 
            background-color: #1a1b28; 
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <main class="login-container success-card">
        <div class="icon-circle">✓</div>
        <h2>Kayıt Başarılı! 🎉</h2>
        <p>Aramıza hoş geldin Şefim! Bilgilerin güvenle mutfağımıza eklendi. Tarif dünyasının kapıları senin için açıldı.</p>
        
        <a href="/login" class="btn-success">Şimdi Giriş Yap</a>
    </main>

</body>
</html>
